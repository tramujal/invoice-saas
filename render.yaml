# Render Blueprint for the FastAPI backend.
# https://render.com/docs/blueprint-spec
#
# Usage: in the Render dashboard, "New +" -> "Blueprint", point it at this
# repo. Render will read this file and create the service below. Env vars
# marked `sync: false` are left empty for you to fill in from the dashboard —
# they are never stored in this file or the repo.

services:
  - type: web
    name: invoicing-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
