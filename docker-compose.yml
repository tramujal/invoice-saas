# Local Docker Compose stack: Postgres + backend + frontend.
#
# `docker compose up --build` works with no .env file at all -- every value
# below is a safe local default. Container-internal values (the Postgres
# URL, service hostnames) are hardcoded as literal `environment:` values,
# not ${VAR} substitution: Compose auto-loads a file literally named `.env`
# next to this file unconditionally, and a developer who previously ran the
# existing non-Docker setup (`cp .env.example .env`, SQLite-flavored
# DATABASE_URL) would otherwise have that value silently win over the
# Postgres URL this stack actually needs. ${VAR:-} substitution is used only
# for genuinely optional overrides (AI/email keys), where "unset" is already
# a safe, supported app state -- see .env.docker.example.
#
# This is purely additive: it does not change the existing Render/Vercel/
# Neon deployment (render.yaml is untouched) or the existing non-Docker
# local dev flow (SQLite via `uvicorn --reload` / `npm run dev`).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: invoicing
      POSTGRES_USER: invoicing
      POSTGRES_PASSWORD: invoicing_local_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Published for local debugging (psql, a GUI client) -- remove if
      # you don't need host-side access to this database.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoicing -d invoicing"]
      # Explicit (not bare-default) tuning: the official postgres image
      # runs a temporary internal instance during first-run initdb before
      # its real restart, and a naive healthcheck can briefly report ready
      # against that transient instance.
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://invoicing:invoicing_local_dev@db:5432/invoicing
      # Local reproducibility, not a production deploy -- ENVIRONMENT=production
      # would make JWT_SECRET_KEY import-time-fatal if unset and disable the
      # AI_MODEL dev fallback, adding friction to a bare `docker compose up`.
      ENVIRONMENT: development
      JWT_SECRET_KEY: local-docker-dev-secret-change-me
      # No reverse proxy exists in this topology (browser -> host-mapped
      # port -> container directly) -- 0 matches local dev exactly.
      TRUSTED_PROXY_HOPS: "0"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      FRONTEND_BASE_URL: http://localhost:3000
      # Optional providers -- safely unset by default; the app starts fine
      # and only 503s lazily if an endpoint that needs one is actually
      # called. Set these in a .env file (copy .env.docker.example) to
      # enable real email/AI locally.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_MODEL: ${AI_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time -- must be the URL the
        # browser can reach (the host-mapped backend port), never the
        # Docker-internal "backend" hostname.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    # No runtime `environment:` needed here -- NEXT_PUBLIC_API_URL is
    # build-time only (see frontend/Dockerfile); setting it here would have
    # no effect on the already-built pages.
    ports:
      - "3000:3000"
    restart: on-failure

volumes:
  pgdata:
